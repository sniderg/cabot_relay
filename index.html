<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabot Trail Relay 2026 - The Old Hammers Masters Campaign</title>
    <meta name="description" content="Track the epic battle of The Old Hammers in the Masters category of the 2026 Cabot Trail Relay on Cape Breton Island.">
    
    <!-- Leaflet.js CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
          
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="brand">
            <img src="logo.png" alt="Road Hammers Logo" class="brand-logo">
            <div class="brand-title">
                <h1>The Old Hammers</h1>
                <p>Cabot Trail Relay 2026 • Masters Category Battle</p>
            </div>
        </div>
        
        <div class="nav-controls">
            <button id="view-mode-button" class="btn active">Interactive Loop Playback</button>
        </div>
    </header>

    <main class="app-container">

        <!-- Center: Interactive Map -->
        <section class="map-section">
            <div id="map"></div>
            
            <!-- Floating Course Legs Selector (Table of Contents) -->
            <div class="map-overlay-legs" id="legs-overlay-container">
                <div class="legs-overlay-content" id="legs-overlay-content">
                    <!-- Loaded dynamically via app.js -->
                </div>
            </div>
            
            <!-- Static Overall Standings in upper right corner -->
            <div class="map-overlay-leaderboard">
                <div class="overlay-title">
                    Cumulative Standings
                </div>
                <div class="standings-list" id="standings-container">
                    <!-- Loaded dynamically via app.js -->
                </div>
            </div>

            <!-- Static Matchups in upper left corner -->
            <div class="map-overlay-matchup" id="matchup-overlay-container">
                <!-- Loaded dynamically via app.js -->
            </div>
            
            <div class="map-overlay-controls">
                <button id="playback-prev" class="map-control-btn" title="Previous Leg">⏮</button>
                <button id="playback-toggle" class="map-control-btn" title="Play Simulation">▶</button>
                <button id="playback-next" class="map-control-btn" title="Next Leg">⏭</button>
                <div class="playback-progress">
                    <div class="playback-bar" id="playback-progress-bar"></div>
                </div>
                <span id="playback-label" style="font-family: var(--font-mono); font-size: 0.8rem; font-weight: 700;">Leg 1/17</span>
            </div>
        </section>

    </main>

    <!-- Leaflet.js Script -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
            
    <!-- Main App Script -->
    <script src="app.js"></script>
</body>
</html>
